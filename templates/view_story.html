{% extends 'base.html' %}

{% block title %}Просмотр сторис{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 30px auto; background: #000; border-radius: 12px; overflow: hidden; text-align: center; padding: 20px;">
    <div style="color: white; margin-bottom: 15px; font-weight: 600;">
        {{ story.user.username }}
    </div>

    {% if story.image %}
        <img src="{{ story.image.url }}" alt="story"
             style="max-width: 100%; max-height: 70vh; object-fit: contain; border-radius: 10px;">
    {% elif story.video %}
        <video controls autoplay style="max-width: 100%; max-height: 70vh; border-radius: 10px;">
            <source src="{{ story.video.url }}">
            Ваш браузер не поддерживает видео.
        </video>
    {% endif %}
</div>
{% endblock %}

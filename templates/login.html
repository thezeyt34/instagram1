{% extends 'base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<div style="max-width: 350px; margin: 60px auto; background: white; border: 1px solid #dbdbdb; padding: 40px; border-radius: 1px; text-align: center;">
    <h1 style="font-family: 'Comic Sans MS', cursive; margin-bottom: 30px;">Instagram</h1>
    <form method="post" style="text-align: left;">
        {% csrf_token %}
        <style>
            input { width: 100%; padding: 9px; border: 1px solid #dbdbdb; background: #fafafa; border-radius: 3px; box-sizing: border-box; margin-bottom: 10px; font-size: 12px; }
        </style>
        {{ form.as_p }}
        <button type="submit" style="width: 100%; background: #0095f6; color: white; border: none; padding: 7px; border-radius: 4px; font-weight: 600; margin-top: 10px;">Войти</button>
    </form>
    <div style="margin-top: 20px; color: #8e8e8e; font-size: 14px;">
        Нет аккаунта? <a href="{% url 'register' %}" style="color: #0095f6; text-decoration: none; font-weight: 600;">Зарегистрироваться</a>
    </div>
</div>
{% endblock %}
